name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-14
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: |
            ## Claude Code Usage ${{ github.ref_name }}

            Desktop app to monitor your Claude Code usage in real-time.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows (exe) | See assets below |
            | Windows (msi) | See assets below |
            | macOS (Apple Silicon) | See assets below |
            | macOS (Intel) | See assets below |

            ### Requirements
            - [Claude Code](https://docs.anthropic.com/en/docs/claude-code/overview) installed and logged in
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  update-readme:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update README download links
        run: |
          VERSION="${GITHUB_REF_NAME}"
          V="${VERSION#v}"
          REPO="${{ github.repository }}"

          # Write the new download table to a temp file
          cat > /tmp/table.md << EOF
          | Platform | Installer |
          |----------|-----------|
          | Windows (exe) | [Download](https://github.com/${REPO}/releases/download/${VERSION}/Claude.Code.Usage_${V}_x64-setup.exe) |
          | Windows (msi) | [Download](https://github.com/${REPO}/releases/download/${VERSION}/Claude.Code.Usage_${V}_x64_en-US.msi) |
          | macOS (Apple Silicon) | [Download](https://github.com/${REPO}/releases/download/${VERSION}/Claude.Code.Usage_${V}_aarch64.dmg) |
          | macOS (Intel) | [Download](https://github.com/${REPO}/releases/download/${VERSION}/Claude.Code.Usage_${V}_x64.dmg) |

          Or browse all releases: [github.com/${REPO}/releases](https://github.com/${REPO}/releases)
          EOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' /tmp/table.md

          # Replace download section in README using Python
          python3 << 'PYEOF'
          import re

          with open('/tmp/table.md', 'r') as f:
              table = f.read().strip()

          with open('README.md', 'r') as f:
              content = f.read()

          pattern = r'(### Download\n\n).*?(\n\n### Requirements)'
          replacement = r'\1' + table.replace('\\', '\\\\') + r'\2'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          with open('README.md', 'w') as f:
              f.write(content)
          PYEOF

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update download links for ${GITHUB_REF_NAME}"
          git push
